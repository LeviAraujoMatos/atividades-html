<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <h1>
            Cadastro de Interesses
        </h1>
        <p>
            Levi de Araújo Matos
        </p>
        <img src="batman.jpg" width="150px">
        <form method="post" action=" https://nic.ifrn.edu.br/aulas/atividade_03/">
            <p>
                Nome
            </p>
        <input type="text" id="nome" name="nome">
        <br>
        <p>Curso</p>
        <input type="radio" name="curso" value="Informatica">
        <label>Informatica</label>
        <br>
        <input type="radio" name="curso" value="Eventos">
        <label>Eventos</label>
        <br>
        <input type="radio" name="curso" value="Eletromecanica">
        <label>Eletromecanica</label>
        <br>

        <p>Quais são seus interesses?</p>
        <input type="checkbox" name="interesses[]" value="Esportes">
        <label>Esportes</label>

        <br>

        <input type="checkbox" name="interesses[]" value="Jogos">
        <label>Jogos</label>

        <br>

        <input type="checkbox" name="interesses[]" value="Filmes">
        <label>Filmes</label>

        <br>

        <input type="checkbox" name="interesses[]" value="Livros">
        <label>Livros</label>
        <br>
         <button type="submit">Enviar</button>

    </form>
    </body>
</html>
